const $$ = (sel, ctx=document) => [...ctx.querySelectorAll(sel)];
const uid = (pre='id') => pre + '_' + Math.random().toString(36).slice(2,9);

}

  lucide.createIcons();
  const close = () => { wrap.remove(); onClose && onClose(); };

    const btn = document.createElement('button');

    btn.onclick = () => { b.onClick && b.onClick(close); };
    btnArea.appendChild(btn);
  });
  return { close, el: wrap };
}

  saveDB();

/* ---------- AUTH ---------- */
function checkRateLimit(key) {
  const a = LOGIN_ATTEMPTS[key];
  if (!a) return { ok:true };
  if (a.lockUntil && Date.now() < a.lockUntil) return { ok:false, wait: Math.ceil((a.lockUntil-Date.now())/1000) };
  return { ok:true };
}
function markFail(key) {
  LOGIN_ATTEMPTS[key] = LOGIN_ATTEMPTS[key] || { count:0 };
  LOGIN_ATTEMPTS[key].count++;
  if (LOGIN_ATTEMPTS[key].count >= 5) {
    LOGIN_ATTEMPTS[key].lockUntil = Date.now() + 60000;
    LOGIN_ATTEMPTS[key].count = 0;
  }
}
function markSuccess(key) { delete LOGIN_ATTEMPTS[key]; }

function login(identifier, password) {
  const rl = checkRateLimit(identifier);
  if (!rl.ok) return { error: `Terlalu banyak percobaan. Tunggu ${rl.wait} detik.` };
  const u = DB.users.find(x => (x.email.toLowerCase()===identifier.toLowerCase()) || (x.nisn && x.nisn===identifier));
  if (!u) { markFail(identifier); return { error:'Akun tidak ditemukan' }; }
  if (atob(u.password) !== password) { markFail(identifier); return { error:'Password salah' }; }
  if (u.role==='siswa' && u.locked) return { error:'Akun Anda dikunci. Hubungi guru.' };
  markSuccess(identifier);
  SESSION = { userId:u.id, role:u.role, name:u.name, loginAt: Date.now(), lastActive: Date.now() };
  saveSession();
  audit('Login', `${u.role} ${u.name}`);
  return { ok:true, user:u };
}

function logout() {
  if (SESSION) audit('Logout', SESSION.name);
  SESSION = null;
  CURRENT_EXAM = null;
  saveSession();
  render();
}

function resetIdle() {
  if (!SESSION) return;
  SESSION.lastActive = Date.now();
  saveSession();
}
function startIdleTimer() {
  if (IDLE_TIMER) clearInterval(IDLE_TIMER);
  IDLE_TIMER = setInterval(() => {
    if (!SESSION) return;
    const diff = (Date.now() - SESSION.lastActive) / 60000;
    if (diff > (DB.settings.idleTimeout || 15)) {
      toast('Sesi berakhir karena tidak aktif', 'warn');
      logout();
    }
  }, 30000);
  ['click','keydown','mousemove','touchstart','scroll'].forEach(ev => document.addEventListener(ev, resetIdle, { passive:true }));
}

/* ---------- DATA HELPERS ---------- */
const getUser = (id) => DB.users.find(u => u.id===id);
const getMapel = (id) => DB.mapel.find(m => m.id===id);

const getUjian = (id) => DB.ujian.find(u => u.id===id);
const getSoal = (id) => DB.soal.find(s => s.id===id);

function encryptSoal(soal) {
  // simple base64 for demonstration
  return btoa(unescape(encodeURIComponent(JSON.stringify(soal))));
}
function decryptSoal(enc) {
  try { return JSON.parse(decodeURIComponent(escape(atob(enc)))); } catch { return null; }
}

/* ---------- VALIDATION ---------- */
function validateInput(str) {
  // basic anti-injection
  if (!str) return '';

/* ---------- EXAM ENGINE ---------- */
function startExamSession(user, ujian) {
  // Cek apakah sudah pernah submit
  const existing = DB.hasil.find(h => h.userId===user.id && h.ujianId===ujian.id);
  if (existing) return { alreadyDone: true, hasil: existing };
  
  // Cek waktu
  const now = Date.now();
  const start = new Date(ujian.mulai).getTime();
  const end = new Date(ujian.selesai).getTime();
  if (now < start) return { error:'Ujian belum dimulai' };
  if (now > end) return { error:'Ujian sudah berakhir' };
  
  // Siapkan urutan soal (acak jika perlu)
  let soalList = [...ujian.soalIds];
  if (ujian.acak) soalList = soalList.sort(()=>Math.random()-0.5);
  
  // Enkripsi soal sebelum ujian
  const encrypted = soalList.map(id => encryptSoal(getSoal(id)));
  
  const sessionId = uid('sess');
  const deviceInfo = `${navigator.userAgent.split(' ').slice(-2).join(' ')} | ${screen.width}x${screen.height}`;
  
  const sess = {
    id: sessionId,
    userId: user.id,
    ujianId: ujian.id,
    startTime: now,
    lastActive: now,
    device: deviceInfo,
    status: 'Sedang ujian',
    answers: {},      // soalId -> jawaban
    doubt: {},        // soalId -> true/false
    currentIdx: 0,
    soalOrder: soalList,
    encryptedSoal: encrypted,
    acakOpsi: ujian.acakOpsi ? soalList.map(()=>[0,1,2,3,4].sort(()=>Math.random()-.5).slice(0, getSoal(soalList[0])?.opsi?.length||2)) : null,
    submitted: false,
  };
  DB.examSessions[sessionId] = sess;
  saveDB();
  return { ok:true, sessionId };
}

function saveExamProgress() {
  if (!CURRENT_EXAM) return;
  const sess = DB.examSessions[CURRENT_EXAM.sessionId];
  if (sess) {
    sess.lastActive = Date.now();
    saveDB();
  }
}

/* ---------- AUTO-GRADING ---------- */
function gradeAnswer(soal, jawaban) {
  if (!soal || jawaban === undefined || jawaban === null) return 0;
  switch(soal.type) {
    case 'pg':
      return jawaban === soal.kunci ? soal.bobot : 0;
    case 'bs':
      return jawaban === soal.kunci ? soal.bobot : 0;
    case 'pg_kompleks': {
      const ans = Array.isArray(jawaban) ? jawaban : [];
      const correct = soal.kunci;
      const matched = ans.filter(a => correct.includes(a)).length;
      return Math.round((matched / correct.length) * soal.bobot);
    }
    case 'jodoh': {
      // jawaban: {leftIndex: rightIndex}
      if (!jawaban || typeof jawaban !== 'object') return 0;
      const pairs = soal.pasangan;
      let correct = 0;
      pairs.forEach((_, i) => { if (jawaban[i] === i) correct++; });
      return Math.round((correct / pairs.length) * soal.bobot);
    }
    case 'isian': {
      const ans = String(jawaban||'').trim().toLowerCase().replace(/\s+/g,' ');
      if (!ans) return 0;
      const keys = soal.kunci.map(k => k.trim().toLowerCase().replace(/\s+/g,' '));
      return keys.includes(ans) ? soal.bobot : 0;
    }
    case 'uraian': {
      // auto: keyword match + similarity
      const ans = String(jawaban||'').toLowerCase();
      if (!ans.trim()) return 0;
      const keys = soal.kunci || [];
      if (!keys.length) return 0;
      let matched = 0;
      keys.forEach(k => { if (ans.includes(k.toLowerCase())) matched++; });
      const ratio = matched / keys.length;
      return Math.round(ratio * soal.bobot);
    }
  }
  return 0;
}

function submitExam(sessionId) {
  const sess = DB.examSessions[sessionId];
  if (!sess) return;
  const ujian = getUjian(sess.ujianId);
  const user = getUser(sess.userId);
  let totalBobot = 0, totalNilai = 0;
  const details = [];
  sess.soalOrder.forEach(sid => {
    const soal = getSoal(sid);
    totalBobot += soal.bobot;
    const score = sess.doubt[sid] ? 0 : gradeAnswer(soal, sess.answers[sid]);
    totalNilai += score;
    details.push({ soalId: sid, jawaban: sess.answers[sid], skor: score, ragu: !!sess.doubt[sid] });
  });
  const nilai = totalBobot ? Math.round((totalNilai / totalBobot) * 100) : 0;
  const hasil = {
    id: uid('hasil'),
    userId: sess.userId,
    ujianId: sess.ujianId,
    sessionId,
    nilai,
    lulus: nilai >= (ujian.lulus || 70),
    details,
    submittedAt: Date.now(),
    waktuPengerjaan: Date.now() - sess.startTime,
    manualGrade: false,
    komentar: {},
  };
  DB.hasil.push(hasil);
  sess.status = 'Selesai';
  sess.submitted = true;
  saveDB();
  audit('Submit ujian', `${user.name} - ${ujian.judul} - Nilai: ${nilai}`);
  return hasil;
}

    case 'guru': renderGuru(app); break;
    case 'siswa': renderSiswa(app); break;

}

function attachShell(menu) {
  $$('#sidebar [data-nav]').forEach(el => {
    el.onclick = () => { APP_STATE.view = el.dataset.nav; render(); };
  });
  $('#btn-logout').onclick = () => {
    if (CURRENT_EXAM) { toast('Selesaikan ujian dulu', 'warn'); return; }
    logout();
  };
  $('#btn-theme').onclick = () => {
    document.documentElement.classList.toggle('dark');
    render();
  };
  $('#btn-menu').onclick = () => {
    const sb = $('#sidebar');
    sb.classList.toggle('hidden');
    sb.classList.toggle('fixed');
    sb.classList.toggle('inset-0');
    sb.classList.toggle('z-30');
  };
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  const el = $('#live-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('id-ID');
}

/* ---------- EXAM PAGE ---------- */
function renderExamPage(app) {
  const sess = DB.examSessions[CURRENT_EXAM.sessionId];
  if (!sess) { CURRENT_EXAM = null; render(); return; }
  const user = getUser(sess.userId);
  if (user.locked) {
    app.innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-4">
        <div class="card rounded-xl p-8 max-w-md text-center">
          <i data-lucide="lock" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
          <h2 class="text-xl font-bold mb-2">Akun Terkunci</h2>
          <p class="text-muted">Anda tidak dapat melanjutkan ujian. Harap menunggu guru membuka kunci akun Anda.</p>
          <button onclick="logout()" class="btn-primary mt-4 px-4 py-2 rounded-lg">Keluar</button>
        </div>
      </div>`;
    lucide.createIcons();
    return;
  }
  
  const ujian = getUjian(sess.ujianId);
  const soalId = sess.soalOrder[sess.currentIdx];
  const soal = getSoal(soalId);
  const answeredCount = sess.soalOrder.filter(id => sess.answers[id] !== undefined && sess.answers[id] !== null && sess.answers[id] !== '').length;
  const doubtCount = Object.values(sess.doubt).filter(Boolean).length;
  const emptyCount = sess.soalOrder.length - answeredCount;
  const progress = Math.round((answeredCount / sess.soalOrder.length) * 100);
  const elapsed = Date.now() - sess.startTime;
  const remaining = Math.max(0, ujian.durasi*60000 - elapsed);

  app.innerHTML = `
    <div class="fullscreen-mode flex flex-col">
      <header class="card border-b border-theme px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3 min-w-0">
          <img src="https://image.qwenlm.ai/public_source/1beff261-073f-44a6-803b-55112dfdc08a/12876829d-3890-97d4-92dd-fbbeb79d3602.png" class="w-8 h-8" />
          <div class="min-w-0">
            <div class="font-semibold text-sm truncate">${esc(ujian.judul)}</div>
            <div class="text-xs text-muted truncate">${esc(getMapel(ujian.mapelId)?.nama||'')} · Soal ${sess.currentIdx+1}/${sess.soalOrder.length}</div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="hidden sm:flex items-center gap-1 text-xs bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-lg">
            <i data-lucide="check-circle" class="w-3.5 h-3.5 text-green-500"></i>
            <span>${answeredCount}/${sess.soalOrder.length}</span>
          </div>
          <div id="timer" class="flex items-center gap-1 text-sm font-bold px-3 py-1.5 rounded-lg ${remaining < 300000 ? 'bg-red-500 text-white pulse' : 'bg-blue-500 text-white'}">
            <i data-lucide="clock" class="w-4 h-4"></i>
            <span id="timer-text">${fmtTime(remaining)}</span>
          </div>
          <button id="btn-submit-exam" class="btn-primary px-3 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-1">
            <i data-lucide="send" class="w-4 h-4"></i> Selesai
          </button>
        </div>
      </header>
      
      <div class="px-4 pt-2">
        <div class="h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
          <div class="h-full bg-green-500 transition-all" style="width:${progress}%"></div>
        </div>
      </div>
      
      <div class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
        <div class="flex-1 overflow-y-auto scroll-smooth">
          <div class="card rounded-xl p-5">
            <div class="flex items-start justify-between mb-4 gap-2">
              <div class="flex items-center gap-2">
                <span class="bg-blue-500 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold">${sess.currentIdx+1}</span>
                <span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 rounded text-xs">${soalTypeLabel(soal.type)}</span>
                <span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded text-xs">${soal.bobot} poin</span>
              </div>
              <button id="btn-ragu" class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs ${sess.doubt[soalId]?'bg-yellow-500 text-white':'bg-gray-100 dark:bg-gray-700'}">
                <i data-lucide="flag" class="w-3.5 h-3.5"></i>
                ${sess.doubt[soalId]?'Diragukan':'Tandai Ragu'}
              </button>
            </div>
            <div class="mb-5 text-base leading-relaxed">${esc(soal.teks)}</div>
            <div id="soal-input"></div>
            ${sess.doubt[soalId] ? '<div class="mt-4 p-3 bg-yellow-50 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-200 rounded text-sm">⚠ Jawaban tidak akan dihitung karena ditandai ragu</div>':''}
          </div>
          <div class="flex items-center justify-between mt-4 gap-2">
            <button id="btn-prev" class="px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-sm flex items-center gap-1 ${sess.currentIdx===0?'opacity-50 cursor-not-allowed':''}">
              <i data-lucide="chevron-left" class="w-4 h-4"></i> Sebelumnya
            </button>
            <button id="btn-next" class="btn-primary px-4 py-2 rounded-lg text-sm flex items-center gap-1">
              ${sess.currentIdx===sess.soalOrder.length-1?'Selesai':'Berikutnya'} <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
        
        <aside class="md:w-64 card rounded-xl p-3 md:max-h-full overflow-y-auto scroll-smooth">
          <div class="font-semibold text-sm mb-2">Navigasi Soal</div>
          <div class="grid grid-cols-5 md:grid-cols-4 gap-1.5" id="q-nav"></div>
          <div class="mt-3 text-xs space-y-1">
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-green-500"></span> Dijawab</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-yellow-500"></span> Ragu</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-blue-500"></span> Aktif</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-gray-300 dark:bg-gray-600"></span> Belum</div>
          </div>
        </aside>
      </div>
    </div>`;
  
  lucide.createIcons();
  renderSoalInput(soal, sess);
  renderQNav(sess);
  
  // Timer
  if (window.__examTimer) clearInterval(window.__examTimer);
  window.__examTimer = setInterval(() => {
    if (!CURRENT_EXAM || CURRENT_EXAM.submitted) { clearInterval(window.__examTimer); return; }
    const s = DB.examSessions[CURRENT_EXAM.sessionId];
    if (!s) return;
    const u = getUjian(s.ujianId);
    const rem = Math.max(0, u.durasi*60000 - (Date.now()-s.startTime));
    const tt = $('#timer-text');
    if (tt) tt.textContent = fmtTime(rem);
    if (rem <= 0) {
      toast('Waktu habis! Ujian dikirim otomatis','warn');
      doSubmitExam(true);
    }
    // autosave lastActive
    s.lastActive = Date.now();
    saveDB();
  }, 1000);
  
  // Ragu
  $('#btn-ragu').onclick = () => {
    sess.doubt[soalId] = !sess.doubt[soalId];
    saveExamProgress();
    renderExamPage(app);
  };
  
  // Nav
  $('#btn-prev').onclick = () => {
    if (sess.currentIdx > 0) { sess.currentIdx--; saveExamProgress(); renderExamPage(app); }
  };
  $('#btn-next').onclick = () => {
    if (sess.currentIdx < sess.soalOrder.length-1) { sess.currentIdx++; saveExamProgress(); renderExamPage(app); }
    else confirmSubmit();
  };
  
  $('#btn-submit-exam').onclick = confirmSubmit;
}

function soalTypeLabel(t) {
  return { pg:'Pilihan Ganda', pg_kompleks:'PG Kompleks', bs:'Benar/Salah', jodoh:'Menjodohkan', isian:'Isian Singkat', uraian:'Uraian' }[t] || t;
}

function renderSoalInput(soal, sess) {
  const wrap = $('#soal-input');
  if (!wrap) return;
  const sid = soal.id;
  
  if (soal.type === 'pg') {
    wrap.innerHTML = `<div class="space-y-2">${soal.opsi.map((op,i) => `
      <label class="flex items-center gap-3 p-3 rounded-lg border border-theme hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer ${sess.answers[sid]===i?'bg-blue-50 dark:bg-blue-900/30 border-blue-500':''}">
        <input type="radio" name="pg" value="${i}" ${sess.answers[sid]===i?'checked':''} class="w-4 h-4" />
        <span class="w-7 h-7 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65+i)}</span>
        <span>${esc(op)}</span>
      </label>`).join('')}</div>`;
    $$('input[name=pg]').forEach(r => r.onchange = () => { sess.answers[sid] = parseInt(r.value); saveExamProgress(); renderExamPage($('#app')); });
  }
  else if (soal.type === 'pg_kompleks') {
    const sel = Array.isArray(sess.answers[sid]) ? sess.answers[sid] : [];
    wrap.innerHTML = `<p class="text-xs text-muted mb-2">Pilih lebih dari satu jika perlu</p><div class="space-y-2">${soal.opsi.map((op,i) => `
      <label class="flex items-center gap-3 p-3 rounded-lg border border-theme hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer ${sel.includes(i)?'bg-blue-50 dark:bg-blue-900/30 border-blue-500':''}">
        <input type="checkbox" value="${i}" ${sel.includes(i)?'checked':''} class="w-4 h-4" />
        <span class="w-7 h-7 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65+i)}</span>
        <span>${esc(op)}</span>
      </label>`).join('')}</div>`;
    $$('#soal-input input[type=checkbox]').forEach(c => c.onchange = () => {
      const arr = Array.isArray(sess.answers[sid]) ? [...sess.answers[sid]] : [];
      const v = parseInt(c.value);
      const idx = arr.indexOf(v);
      if (idx >= 0) arr.splice(idx,1); else arr.push(v);
      sess.answers[sid] = arr;
      saveExamProgress();
      renderExamPage($('#app'));
    });
  }
  else if (soal.type === 'bs') {
    wrap.innerHTML = `<div class="grid grid-cols-2 gap-3">
      <button data-v="true" class="bs-btn p-4 rounded-lg border-2 ${sess.answers[sid]===true?'border-green-500 bg-green-50 dark:bg-green-900/30':'border-theme'} font-bold text-lg">✓ BENAR</button>
      <button data-v="false" class="bs-btn p-4 rounded-lg border-2 ${sess.answers[sid]===false?'border-red-500 bg-red-50 dark:bg-red-900/30':'border-theme'} font-bold text-lg">✗ SALAH</button>
    </div>`;
    $$('.bs-btn').forEach(b => b.onclick = () => { sess.answers[sid] = b.dataset.v === 'true'; saveExamProgress(); renderExamPage($('#app')); });
  }
  else if (soal.type === 'jodoh') {
    const ans = sess.answers[sid] || {};
    const leftItems = soal.pasangan.map((p,i) => ({ idx:i, text:p[0] }));
    const rightItems = soal.pasangan.map((p,i) => ({ idx:i, text:p[1] })).sort(()=>Math.random()-0.5);
    
    wrap.innerHTML = `
      <p class="text-xs text-muted mb-3">Drag jawaban dari kanan ke kotak di samping kiri</p>
      <div class="space-y-2">
        ${leftItems.map(l => `
          <div class="flex items-center gap-2">
            <div class="flex-1 p-3 bg-gray-50 dark:bg-gray-800 rounded font-semibold">${esc(l.text)}</div>
            <i data-lucide="arrow-right" class="w-4 h-4 text-muted"></i>
            <div class="flex-1 drop-zone rounded p-2 text-center ${ans[l.idx]!==undefined?'bg-green-50 dark:bg-green-900/30':''}" data-left="${l.idx}">
              ${ans[l.idx]!==undefined ? esc(soal.pasangan[ans[l.idx]][1]) : '<span class="text-muted text-xs">Drop di sini</span>'}
            </div>
          </div>`).join('')}
      </div>
      <div class="mt-4">
        <div class="text-sm font-semibold mb-2">Pilihan Jawaban:</div>
        <div class="flex flex-wrap gap-2" id="right-pool">
          ${rightItems.filter(r => !Object.values(ans).includes(r.idx)).map(r => `
            <div class="drag-item px-3 py-2 bg-blue-500 text-white rounded cursor-move text-sm" draggable="true" data-ridx="${r.idx}">${esc(r.text)}</div>
          `).join('')}
        </div>
      </div>
      <button id="reset-jodoh" class="mt-3 text-xs text-red-500">Reset jawaban</button>`;
    lucide.createIcons();
    
    $$('.drag-item').forEach(el => {
      el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', el.dataset.ridx); });
    });
    $$('.drop-zone').forEach(el => {
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', e => {
        e.preventDefault(); el.classList.remove('drag-over');
        const ridx = parseInt(e.dataTransfer.getData('text/plain'));
        const lidx = parseInt(el.dataset.left);
        sess.answers[sid] = sess.answers[sid] || {};
        sess.answers[sid][lidx] = ridx;
        saveExamProgress();
        renderExamPage($('#app'));
      });
    });
    $('#reset-jodoh').onclick = () => { delete sess.answers[sid]; saveExamProgress(); renderExamPage($('#app')); };
  }
  else if (soal.type === 'isian') {
    wrap.innerHTML = `<input type="text" id="isian-input" value="${esc(sess.answers[sid]||'')}" class="w-full p-3 rounded-lg" placeholder="Ketik jawaban..." />`;
    $('#isian-input').oninput = (e) => { sess.answers[sid] = e.target.value; saveExamProgress(); };
  }
  else if (soal.type === 'uraian') {
    wrap.innerHTML = `<textarea id="uraian-input" rows="8" class="w-full p-3 rounded-lg" placeholder="Tulis jawaban Anda...">${esc(sess.answers[sid]||'')}</textarea>
      <div class="text-xs text-muted mt-1">Jawaban akan dinilai otomatis berdasarkan kata kunci</div>`;
    $('#uraian-input').oninput = (e) => { sess.answers[sid] = e.target.value; saveExamProgress(); };
  }
}

function renderQNav(sess) {
  const nav = $('#q-nav');
  if (!nav) return;
  nav.innerHTML = sess.soalOrder.map((id, i) => {
    const answered = sess.answers[id] !== undefined && sess.answers[id] !== null && sess.answers[id] !== '';
    const doubt = sess.doubt[id];
    const current = i === sess.currentIdx;
    let cls = 'q-btn w-full aspect-square rounded-lg border border-theme text-xs font-bold ';
    if (current) cls += 'q-current ';
    else if (doubt) cls += 'q-doubt ';
    else if (answered) cls += 'q-answered ';
    else cls += 'bg-gray-100 dark:bg-gray-700 ';
    return `<button class="${cls}" data-idx="${i}">${i+1}</button>`;
  }).join('');
  $$('#q-nav button').forEach(b => b.onclick = () => {
    sess.currentIdx = parseInt(b.dataset.idx);
    saveExamProgress();
    renderExamPage($('#app'));
  });
}

function confirmSubmit() {
  const sess = DB.examSessions[CURRENT_EXAM.sessionId];
  const answered = sess.soalOrder.filter(id => sess.answers[id] !== undefined && sess.answers[id] !== null && sess.answers[id] !== '').length;
  const doubt = Object.values(sess.doubt).filter(Boolean).length;
  const empty = sess.soalOrder.length - answered;
  
  modal({
    title: 'Kirim Jawaban?',
    body: `
      <div class="space-y-2 text-sm">
        <div class="grid grid-cols-3 gap-2">
          <div class="p-3 rounded-lg bg-green-50 dark:bg-green-900/30 text-center">
            <div class="text-2xl font-bold text-green-600">${answered}</div>
            <div class="text-xs">Selesai</div>
          </div>
          <div class="p-3 rounded-lg bg-yellow-50 dark:bg-yellow-900/30 text-center">
            <div class="text-2xl font-bold text-yellow-600">${doubt}</div>
            <div class="text-xs">Ragu</div>
          </div>
          <div class="p-3 rounded-lg bg-red-50 dark:bg-red-900/30 text-center">
            <div class="text-2xl font-bold text-red-600">${empty}</div>
            <div class="text-xs">Kosong</div>
          </div>
        </div>
        ${empty>0 ? '<p class="text-yellow-600 text-xs">⚠ Masih ada soal kosong</p>':''}
        <p>Yakin ingin mengirim jawaban?</p>
      </div>`,
    buttons:[
      { text:'Batal', class:'px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700' },
      { text:'Kirim', class:'btn-primary px-4 py-2 rounded-lg', onClick: (close) => { close(); doSubmitExam(false); } }
    ]
  });
}

function doSubmitExam(auto) {
  if (!CURRENT_EXAM || CURRENT_EXAM.submitted) return;
  CURRENT_EXAM.submitted = true;
  const hasil = submitExam(CURRENT_EXAM.sessionId);
  if (window.__examTimer) clearInterval(window.__examTimer);
  try { document.exitFullscreen?.(); } catch {}
  CURRENT_EXAM = null;
  render();
  setTimeout(() => {
    if (hasil) {
      modal({
        title: auto ? 'Waktu Habis' : 'Ujian Terkirim',
        body: `<div class="text-center">
          <i data-lucide="${hasil.lulus?'check-circle':'x-circle'}" class="w-16 h-16 mx-auto mb-3 ${hasil.lulus?'text-green-500':'text-red-500'}"></i>
          <div class="text-3xl font-bold mb-1">${hasil.nilai}</div>
          <div class="text-muted mb-2">Nilai Anda</div>
          <span class="px-3 py-1 rounded-full text-xs ${hasil.lulus?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${hasil.lulus?'LULUS':'BELUM LULUS'}</span>
        </div>`,
        buttons:[{ text:'Tutup', class:'btn-primary px-4 py-2 rounded-lg', onClick:(c)=>{ c(); viewHasil(hasil.id); } }]
      });
    }
  }, 100);
}

            const siswa = getUser(h.userId);
            return `
              <div class="card rounded-xl p-4">
                <div class="flex items-center justify-between mb-2">
                  <div>
                    <div class="font-semibold">${esc(siswa?.name||'')}</div>

                  <button onclick="openKoreksi('${h.id}')" class="btn-primary px-3 py-1.5 rounded text-xs">Koreksi</button>
                </div>
              </div>`;
          }).join('')}
      </div>
    `;
  }
  else if (APP_STATE.view === 'hasil') {

    const fUj = filter.ujianId;
    const fKls = filter.kelasId;

      if (fUj && h.ujianId !== fUj) return false;
      if (fKls) {
        const s = getUser(h.userId);
        if (s?.kelasId !== fKls) return false;
      }
      return true;
    });
    const avg = filtered.length ? Math.round(filtered.reduce((a,h)=>a+h.nilai,0)/filtered.length) : 0;
    const lulus = filtered.filter(h=>h.lulus).length;
    
    content = `
      <h2 class="font-bold text-lg mb-4">Hasil & Laporan</h2>
      <div class="card rounded-xl p-3 mb-4 flex flex-wrap gap-2">
        <select id="f-ujian" class="px-3 py-1.5 rounded-lg text-sm">
          <option value="">Semua Ujian</option>
          ${myUjian.map(u => `<option value="${u.id}" ${fUj===u.id?'selected':''}>${esc(u.judul)}</option>`).join('')}
        </select>
        <select id="f-kelas" class="px-3 py-1.5 rounded-lg text-sm">
          <option value="">Semua Kelas</option>
          ${DB.kelas.map(k => `<option value="${k.id}" ${fKls===k.id?'selected':''}>${esc(k.nama)}</option>`).join('')}
        </select>
        <button onclick="exportExcel()" class="btn-primary px-3 py-1.5 rounded-lg text-sm flex items-center gap-1"><i data-lucide="download" class="w-3.5 h-3.5"></i> Export Excel</button>
      </div>
      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="stat-card rounded-xl p-3 text-white"><div class="text-xl font-bold">${filtered.length}</div><div class="text-xs opacity-90">Total</div></div>
        <div class="stat-card-2 rounded-xl p-3 text-white"><div class="text-xl font-bold">${avg}</div><div class="text-xs opacity-90">Rata-rata</div></div>
        <div class="stat-card-3 rounded-xl p-3 text-white"><div class="text-xl font-bold">${lulus}/${filtered.length}</div><div class="text-xs opacity-90">Lulus</div></div>
      </div>
      <div class="card rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm" id="hasil-table">
            <thead class="bg-gray-50 dark:bg-gray-800"><tr>
              <th class="text-left p-3">Siswa</th><th class="text-left p-3">Kelas</th><th class="text-left p-3">Ujian</th>
              <th class="text-center p-3">Nilai</th><th class="text-center p-3">Status</th>
            </tr></thead>
            <tbody>
              ${filtered.map(h => {
                const s = getUser(h.userId), u = getUjian(h.ujianId);
                return `<tr class="border-t border-theme">
                  <td class="p-3">${esc(s?.name||'-')}</td>
                  <td class="p-3">${esc(getKelas(s?.kelasId)?.nama||'-')}</td>
                  <td class="p-3">${esc(u?.judul||'-')}</td>
                  <td class="p-3 text-center font-bold">${h.nilai}</td>
                  <td class="p-3 text-center"><span class="px-2 py-0.5 ${h.lulus?'bg-green-100 text-green-700':'bg-red-100 text-red-700'} rounded text-xs">${h.lulus?'Lulus':'Belum'}</span></td>
                </tr>`;
              }).join('') || '<tr><td colspan="5" class="p-6 text-center text-muted">Tidak ada data</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
  else if (APP_STATE.view === 'siswa') {
    const siswa = DB.users.filter(u => u.role==='siswa');
    content = `
      <h2 class="font-bold text-lg mb-4">Kelola Siswa</h2>
      <div class="card rounded-xl p-3 mb-4 flex flex-wrap gap-2">
        <select id="f-kelas-siswa" class="px-3 py-1.5 rounded-lg text-sm">
          <option value="">Semua Kelas</option>
          ${DB.kelas.map(k => `<option value="${k.id}">${esc(k.nama)}</option>`).join('')}
        </select>
      </div>
      <div class="space-y-2" id="siswa-list">
        ${siswa.map(s => `
          <div class="card rounded-xl p-3 flex items-center justify-between">
            <div>
              <div class="font-semibold">${esc(s.name)}</div>
              <div class="text-xs text-muted">${esc(s.nisn)} · ${esc(getKelas(s.kelasId)?.nama||'-')}</div>
            </div>
            <div class="flex gap-1">
              ${s.locked ? 
                `<button onclick="toggleLock('${s.id}')" class="px-3 py-1.5 rounded bg-green-500 text-white text-xs">🔓 Buka</button>` :
                `<button onclick="toggleLock('${s.id}')" class="px-3 py-1.5 rounded bg-red-500 text-white text-xs">🔒 Kunci</button>`
              }
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  app.innerHTML = shellLayout('guru', menu, content);
  attachShell(menu);
  attachGuruEvents();
}

function soalCard(s) {
  return `<div class="card rounded-xl p-3">
    <div class="flex items-start justify-between gap-2">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <span class="px-2 py-0.5 bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200 rounded text-xs">${soalTypeLabel(s.type)}</span>
          <span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 rounded text-xs">${esc(getMapel(s.mapelId)?.nama||'')}</span>
          <span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded text-xs">${s.bobot} poin</span>
        </div>
        <div class="text-sm">${esc(s.teks)}</div>
      </div>
      <div class="flex gap-1">
        <button onclick="openSoalEditor('${s.id}')" class="p-1.5 rounded bg-blue-500 text-white"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>

  </div>`;

function attachGuruEvents() {
  const fMapel = $('#f-mapel'), fType = $('#f-type');
  if (fMapel && fType) {
    const upd = () => {
      const user = getUser(SESSION.userId);
      const m = fMapel.value, t = fType.value;
      const list = DB.soal.filter(s => (user.mapelIds||[]).includes(s.mapelId) && (!m || s.mapelId===m) && (!t || s.type===t));
      $('#soal-list').innerHTML = list.map(s => soalCard(s)).join('') || '<div class="card rounded-xl p-6 text-center text-muted">Tidak ada soal</div>';
      lucide.createIcons();
    };
    fMapel.onchange = upd; fType.onchange = upd;
  }
  const fUj = $('#f-ujian'), fKls = $('#f-kelas');
  if (fUj && fKls) {
    fUj.onchange = () => { APP_STATE.filter.ujianId = fUj.value; render(); };
    fKls.onchange = () => { APP_STATE.filter.kelasId = fKls.value; render(); };
  }
  const fKs = $('#f-kelas-siswa');
  if (fKs) {
    fKs.onchange = () => {
      const v = fKs.value;
      const list = DB.users.filter(u => u.role==='siswa' && (!v || u.kelasId===v));
      $('#siswa-list').innerHTML = list.map(s => `
        <div class="card rounded-xl p-3 flex items-center justify-between">
          <div>
            <div class="font-semibold">${esc(s.name)}</div>
            <div class="text-xs text-muted">${esc(s.nisn)} · ${esc(getKelas(s.kelasId)?.nama||'-')}</div>
          </div>
          <div class="flex gap-1">
            ${s.locked ? 
              `<button onclick="toggleLock('${s.id}')" class="px-3 py-1.5 rounded bg-green-500 text-white text-xs">🔓 Buka</button>` :
              `<button onclick="toggleLock('${s.id}')" class="px-3 py-1.5 rounded bg-red-500 text-white text-xs">🔒 Kunci</button>`
            }
          </div>
        </div>`).join('') || '<div class="text-muted text-sm">Tidak ada siswa</div>';
    };
  }
}

window.toggleLock = (sid) => {
  const s = getUser(sid);
  if (!s) return;
  s.locked = !s.locked;
  saveDB();
  audit(s.locked?'Kunci siswa':'Buka siswa', s.name);
  toast(s.locked?'Siswa dikunci':'Siswa dibuka', 'success');
  render();
};

window.deleteUjian = (id) => {
  modal({
    title:'Hapus Ujian?', body:'Tindakan ini tidak dapat dibatalkan.',
    buttons:[
      { text:'Batal', class:'px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700' },
      { text:'Hapus', class:'px-4 py-2 rounded-lg bg-red-500 text-white', onClick:(c)=>{
        DB.ujian = DB.ujian.filter(u=>u.id!==id);
        saveDB(); audit('Hapus ujian', id); c(); render();
      }}
    ]
  });
};
window.deleteSoal = (id) => {
  modal({
    title:'Hapus Soal?', body:'Soal akan dihapus dari bank.',
    buttons:[
      { text:'Batal', class:'px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700' },
      { text:'Hapus', class:'px-4 py-2 rounded-lg bg-red-500 text-white', onClick:(c)=>{
        DB.soal = DB.soal.filter(s=>s.id!==id);
        DB.ujian.forEach(u => u.soalIds = u.soalIds.filter(x=>x!==id));
        saveDB(); audit('Hapus soal', id); c(); render();
      }}
    ]
  });
};

/* ---------- UJIAN EDITOR ---------- */

  const mySoal = DB.soal.filter(s => s.mapelId === u.mapelId);
  
  const body = `
    <div class="space-y-3 text-sm">
      <div>
        <label class="font-medium">Judul Ujian</label>
        <input id="e-judul" class="w-full mt-1 p-2 rounded-lg" value="${esc(u.judul)}" />
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="font-medium">Mapel</label>
          <select id="e-mapel" class="w-full mt-1 p-2 rounded-lg">
            ${(user.mapelIds||[]).map(m => `<option value="${m}" ${u.mapelId===m?'selected':''}>${esc(getMapel(m)?.nama||'')}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="font-medium">KKM</label>
          <input id="e-kkm" type="number" class="w-full mt-1 p-2 rounded-lg" value="${u.lulus}" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="font-medium">Durasi (menit)</label>
          <input id="e-durasi" type="number" class="w-full mt-1 p-2 rounded-lg" value="${u.durasi}" />
        </div>
        <div>
          <label class="font-medium flex items-center gap-2 mt-6">
            <input id="e-acak" type="checkbox" ${u.acak?'checked':''} /> Acak Soal
          </label>
          <label class="font-medium flex items-center gap-2 mt-2">
            <input id="e-acak-opsi" type="checkbox" ${u.acakOpsi?'checked':''} /> Acak Opsi
          </label>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="font-medium">Mulai</label>
          <input id="e-mulai" type="datetime-local" class="w-full mt-1 p-2 rounded-lg" value="${u.mulai.slice(0,16)}" />
        </div>
        <div>
          <label class="font-medium">Selesai</label>
          <input id="e-selesai" type="datetime-local" class="w-full mt-1 p-2 rounded-lg" value="${u.selesai.slice(0,16)}" />
        </div>
      </div>
      <div>
        <label class="font-medium">Kelas</label>
        <div class="grid grid-cols-2 gap-1 mt-1" id="e-kelas-list">
          ${DB.kelas.map(k => `<label class="flex items-center gap-2 p-1.5 rounded hover:bg-gray-50 dark:hover:bg-gray-700"><input type="checkbox" value="${k.id}" ${u.kelasIds.includes(k.id)?'checked':''}/> ${esc(k.nama)}</label>`).join('')}
        </div>
      </div>
      <div>
        <label class="font-medium">Pilih Soal (${mySoal.length} tersedia)</label>
        <div class="max-h-48 overflow-y-auto scroll-smooth mt-1 border border-theme rounded-lg p-2 space-y-1" id="e-soal-list">
          ${mySoal.map(s => `<label class="flex items-start gap-2 p-1.5 rounded hover:bg-gray-50 dark:hover:bg-gray-700 text-xs">
            <input type="checkbox" value="${s.id}" ${u.soalIds.includes(s.id)?'checked':''}/>
            <span><b>${soalTypeLabel(s.type)}</b>: ${esc(s.teks.slice(0,70))}${s.teks.length>70?'...':''}</span>
          </label>`).join('') || '<div class="text-muted text-xs">Belum ada soal. Buat soal dulu.</div>'}
        </div>
      </div>
    </div>`;
  
  modal({
    title: id ? 'Edit Ujian' : 'Buat Ujian',
    body,
    buttons:[
      { text:'Batal', class:'px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700' },
      { text:'Simpan', class:'btn-primary px-4 py-2 rounded-lg', onClick:(c)=>{
        u.judul = validateInput($('#e-judul').value);
        u.mapelId = $('#e-mapel').value;
        u.lulus = parseInt($('#e-kkm').value) || 70;
        u.durasi = parseInt($('#e-durasi').value) || 60;
        u.acak = $('#e-acak').checked;
        u.acakOpsi = $('#e-acak-opsi').checked;
        u.mulai = $('#e-mulai').value;

        u.soalIds = $$('#e-soal-list input:checked').map(i=>i.value);

        if (!u.soalIds.length) { toast('Pilih minimal 1 soal','error'); return; }
        if (id) {
          const idx = DB.ujian.findIndex(x=>x.id===id);
          DB.ujian[idx] = u;
        } else {
          DB.ujian.push(u);
        }
        saveDB(); audit(id?'Edit ujian':'Buat ujian', u.judul);
        c(); toast('Ujian disimpan','success'); render();
      }}
    ]
  });
};

/* ---------- SOAL EDITOR ---------- */
window.openSoalEditor = (id) => {
  const user = getUser(SESSION.userId);
  const s = id ? getSoal(id) : { id:uid('q'), type:'pg', mapelId:(user.mapelIds||[])[0]||'', teks:'', opsi:['','','',''], kunci:0, bobot:10 };
  s.pasangan = s.pasangan || [['',''],['','']];
  s.kunci = s.kunci ?? (s.type==='bs' ? true : (s.type==='pg_kompleks' ? [] : (s.type==='isian' ? [] : (s.type==='uraian' ? [] : 0))));
  
  const body = `
    <div class="space-y-3 text-sm">
      <div class="grid grid-cols-3 gap-2">
        <div>
          <label class="font-medium">Tipe</label>
          <select id="s-type" class="w-full mt-1 p-2 rounded-lg">
            <option value="pg" ${s.type==='pg'?'selected':''}>Pilihan Ganda</option>
            <option value="pg_kompleks" ${s.type==='pg_kompleks'?'selected':''}>PG Kompleks</option>
            <option value="bs" ${s.type==='bs'?'selected':''}>Benar/Salah</option>
            <option value="jodoh" ${s.type==='jodoh'?'selected':''}>Menjodohkan</option>
            <option value="isian" ${s.type==='isian'?'selected':''}>Isian</option>
            <option value="uraian" ${s.type==='uraian'?'selected':''}>Uraian</option>
          </select>
        </div>
        <div>
          <label class="font-medium">Mapel</label>
          <select id="s-mapel" class="w-full mt-1 p-2 rounded-lg">
            ${(user.mapelIds||[]).map(m => `<option value="${m}" ${s.mapelId===m?'selected':''}>${esc(getMapel(m)?.nama||'')}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="font-medium">Bobot</label>
          <input id="s-bobot" type="number" class="w-full mt-1 p-2 rounded-lg" value="${s.bobot}" />
        </div>
      </div>
      <div>
        <label class="font-medium">Pertanyaan</label>
        <textarea id="s-teks" rows="3" class="w-full mt-1 p-2 rounded-lg">${esc(s.teks)}</textarea>
      </div>
      <div id="s-options-area"></div>
    </div>`;
  
  const showOptionsArea = () => {
    const area = $('#s-options-area');
    const t = $('#s-type').value;
    if (t === 'pg') {
      s.opsi = s.opsi || ['','','',''];
      if (s.opsi.length < 4) s.opsi = ['','','',''];
      area.innerHTML = `
        <label class="font-medium">Opsi (pilih kunci)</label>
        <div class="space-y-1 mt-1">${s.opsi.map((op,i) => `
          <div class="flex items-center gap-2">
            <input type="radio" name="s-kunci" value="${i}" ${s.kunci===i?'checked':''} class="w-4 h-4"/>
            <input class="s-opsi flex-1 p-2 rounded-lg" data-idx="${i}" value="${esc(op)}" placeholder="Opsi ${String.fromCharCode(65+i)}"/>
          </div>`).join('')}</div>`;
    }
    else if (t === 'pg_kompleks') {
      s.opsi = s.opsi || ['','','','',''];
      if (s.opsi.length < 5) s.opsi = [...s.opsi, ...Array(5-s.opsi.length).fill('')];
      const k = Array.isArray(s.kunci) ? s.kunci : [];
      area.innerHTML = `
        <label class="font-medium">Opsi (centang yang benar)</label>
        <div class="space-y-1 mt-1">${s.opsi.map((op,i) => `
          <div class="flex items-center gap-2">
            <input type="checkbox" name="s-kunci-k" value="${i}" ${k.includes(i)?'checked':''} class="w-4 h-4"/>
            <input class="s-opsi-k flex-1 p-2 rounded-lg" data-idx="${i}" value="${esc(op)}" placeholder="Opsi ${String.fromCharCode(65+i)}"/>
          </div>`).join('')}</div>`;
    }
    else if (t === 'bs') {
      area.innerHTML = `
        <label class="font-medium">Jawaban Benar</label>
        <div class="flex gap-2 mt-1">
          <label class="flex-1 flex items-center gap-2 p-2 border border-theme rounded"><input type="radio" name="s-bs" value="true" ${s.kunci===true?'checked':''}/> Benar</label>
          <label class="flex-1 flex items-center gap-2 p-2 border border-theme rounded"><input type="radio" name="s-bs" value="false" ${s.kunci===false?'checked':''}/> Salah</label>
        </div>`;
    }
    else if (t === 'jodoh') {
      s.pasangan = s.pasangan || [['',''],['','']];
      area.innerHTML = `
        <label class="font-medium">Pasangan (kiri = pertanyaan, kanan = jawaban)</label>
        <div class="space-y-1 mt-1" id="s-pas-list">
          ${s.pasangan.map((p,i) => `
            <div class="flex gap-1 items-center">
              <input class="s-pas-l flex-1 p-2 rounded-lg" data-i="${i}" value="${esc(p[0])}" placeholder="Kiri ${i+1}"/>
              <i data-lucide="arrow-right" class="w-4 h-4 text-muted"></i>
              <input class="s-pas-r flex-1 p-2 rounded-lg" data-i="${i}" value="${esc(p[1])}" placeholder="Kanan ${i+1}"/>
            </div>`).join('')}
        </div>
        <button id="add-pas" class="text-xs text-blue-500 mt-1">+ Tambah Pasangan</button>`;
      lucide.createIcons();
      $('#add-pas').onclick = () => { s.pasangan.push(['','']); showOptionsArea(); };
    }
    else if (t === 'isian') {
      const keys = Array.isArray(s.kunci) ? s.kunci : (s.kunci ? [s.kunci] : ['']);
      area.innerHTML = `
        <label class="font-medium">Kata Kunci (variasi jawaban, pisah per baris)</label>
        <textarea id="s-keys" rows="3" class="w-full mt-1 p-2 rounded-lg">${keys.join('\n')}</textarea>
        <div class="text-xs text-muted">Abaikan kapital dan spasi berlebih saat koreksi</div>`;
    }
    else if (t === 'uraian') {
      const keys = Array.isArray(s.kunci) ? s.kunci : [];
      area.innerHTML = `
        <label class="font-medium">Kata Kunci Penilaian (pisah per baris)</label>
        <textarea id="s-keys-u" rows="3" class="w-full mt-1 p-2 rounded-lg">${keys.join('\n')}</textarea>
        <div class="text-xs text-muted">Skor proporsional berdasarkan kata kunci yang muncul</div>`;
    }
  };
  
  modal({
    title: id ? 'Edit Soal' : 'Tambah Soal',
    body,
    buttons:[
      { text:'Batal', class:'px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700' },
      { text:'Simpan', class:'btn-primary px-4 py-2 rounded-lg', onClick:(c)=>{
        s.type = $('#s-type').value;
        s.mapelId = $('#s-mapel').value;
        s.bobot = parseInt($('#s-bobot').value) || 10;
        s.teks = validateInput($('#s-teks').value);
        if (!s.teks) { toast('Pertanyaan wajib','error'); return; }
        
        if (s.type === 'pg') {
          s.opsi = $$('.s-opsi').map(i=>i.value);
          const k = $('input[name=s-kunci]:checked');
          s.kunci = k ? parseInt(k.value) : 0;
        } else if (s.type === 'pg_kompleks') {
          s.opsi = $$('.s-opsi-k').map(i=>i.value);
          s.kunci = $$('input[name=s-kunci-k]:checked').map(i=>parseInt(i.value));
        } else if (s.type === 'bs') {
          const k = $('input[name=s-bs]:checked');
          s.kunci = k ? k.value === 'true' : true;
        } else if (s.type === 'jodoh') {
          const l = $$('.s-pas-l'), r = $$('.s-pas-r');
          s.pasangan = l.map((x,i) => [x.value, r[i].value]);
        } else if (s.type === 'isian') {
          s.kunci = $('#s-keys').value.split('\n').map(x=>x.trim()).filter(Boolean);
        } else if (s.type === 'uraian') {
          s.kunci = $('#s-keys-u').value.split('\n').map(x=>x.trim()).filter(Boolean);
        }
        
        if (id) {
          const idx = DB.soal.findIndex(x=>x.id===id);
          DB.soal[idx] = s;
        } else {
          DB.soal.push(s);
        }
        saveDB(); audit(id?'Edit soal':'Tambah soal', s.type);
        c(); toast('Soal disimpan','success'); render();
      }}
    ]
  });
  $('#s-type').onchange = () => {
    const t = $('#s-type').value;
    if (t==='pg') { s.opsi=['','','','']; s.kunci=0; }
    else if (t==='pg_kompleks') { s.opsi=['','','','','']; s.kunci=[]; }
    else if (t==='bs') { s.kunci=true; }
    else if (t==='jodoh') { s.pasangan=[['',''],['','']]; }
    else if (t==='isian') { s.kunci=['']; }
    else if (t==='uraian') { s.kunci=[]; }
    showOptionsArea();
  };
  showOptionsArea();
};

  if (!filtered.length) return '<tr><td colspan="7" class="p-6 text-center text-muted">Tidak ada sesi aktif</td></tr>';
  return filtered.map(s => {
    const u = getUser(s.userId);
    const uj = getUjian(s.ujianId);
    const statusColor = { 'Sedang ujian':'bg-blue-100 text-blue-700', 'Selesai':'bg-green-100 text-green-700', 'Belum mulai':'bg-gray-100 text-gray-700' }[s.status] || 'bg-gray-100';

/* ---------- KOREKSI ---------- */
window.openKoreksi = (hasilId) => {
  const h = DB.hasil.find(x => x.id===hasilId);
  if (!h) return;
  const u = getUjian(h.ujianId);
  const s = getUser(h.userId);
  const uraian = h.details.filter(d => getSoal(d.soalId)?.type === 'uraian');
  
  const body = `
    <div class="space-y-3">
      <div class="text-sm">
        <b>${esc(s?.name||'')}</b> · ${esc(u?.judul||'')} · Nilai: <span class="font-bold">${h.nilai}</span>
      </div>
      <div class="max-h-96 overflow-y-auto scroll-smooth space-y-3">
        ${uraian.map((d,i) => {
          const soal = getSoal(d.soalId);
          const komen = h.komentar?.[d.soalId];
          return `
            <div class="border border-theme rounded-lg p-3">
              <div class="font-semibold text-sm mb-1">Soal ${i+1}: ${esc(soal?.teks||'')}</div>
              <div class="text-xs text-muted mb-2">Kunci: ${(soal?.kunci||[]).join(', ')}</div>
              <div class="bg-gray-50 dark:bg-gray-800 p-2 rounded text-sm mb-2">
                <div class="text-xs text-muted mb-1">Jawaban Siswa:</div>
                ${esc(d.jawaban||'(kosong)')}
              </div>
              <div class="flex items-center gap-2 mb-2">
                <label class="text-xs">Skor:</label>
                <input type="number" id="k-skor-${d.soalId}" class="w-20 p-1.5 rounded text-sm" value="${komen?.skor ?? d.skor}" min="0" max="${soal?.bobot||0}"/>
                <span class="text-xs text-muted">/ ${soal?.bobot}</span>
              </div>
              <textarea id="k-komen-${d.soalId}" class="w-full p-2 rounded text-sm" rows="2" placeholder="Komentar guru...">${esc(komen?.text||'')}</textarea>
            </div>`;
        }).join('')}
      </div>
    </div>`;
  
  modal({
    title:'Koreksi Manual',
    body,
    buttons:[
      { text:'Batal', class:'px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700' },
      { text:'Simpan', class:'btn-primary px-4 py-2 rounded-lg', onClick:(c)=>{
        h.komentar = h.komentar || {};
        uraian.forEach(d => {
          const skor = parseInt($(`#k-skor-${d.soalId}`).value) || 0;
          const text = $(`#k-komen-${d.soalId}`).value;
          h.komentar[d.soalId] = { skor, text };
          d.skor = skor;
        });
        // Recalculate total
        const totalBobot = h.details.reduce((a,d) => a + (getSoal(d.soalId)?.bobot||0), 0);
        const totalNilai = h.details.reduce((a,d) => a + d.skor, 0);
        h.nilai = totalBobot ? Math.round((totalNilai/totalBobot)*100) : 0;
        h.lulus = h.nilai >= (u.lulus||70);
        h.manualGrade = true;
        saveDB(); audit('Koreksi manual', `${s?.name} - ${u?.judul}`);
        c(); toast('Koreksi disimpan','success'); render();
      }}
    ]
  });
};

      if (fKls) { const s = getUser(h.userId); if (s?.kelasId !== fKls) return false; }
      return true;
    });
    const avg = filtered.length ? Math.round(filtered.reduce((a,h)=>a+h.nilai,0)/filtered.length) : 0;
    content = `
      <h2 class="font-bold text-lg mb-4">Hasil & Laporan</h2>
      <div class="card rounded-xl p-3 mb-4 flex flex-wrap gap-2">
        <select id="f-ujian-admin" class="px-3 py-1.5 rounded-lg text-sm">
          <option value="">Semua Ujian</option>
          ${DB.ujian.map(u => `<option value="${u.id}" ${fUj===u.id?'selected':''}>${esc(u.judul)}</option>`).join('')}
        </select>
        <select id="f-kelas-admin" class="px-3 py-1.5 rounded-lg text-sm">
          <option value="">Semua Kelas</option>
          ${DB.kelas.map(k => `<option value="${k.id}" ${fKls===k.id?'selected':''}>${esc(k.nama)}</option>`).join('')}
        </select>
        <button onclick="exportExcel()" class="btn-primary px-3 py-1.5 rounded-lg text-sm flex items-center gap-1"><i data-lucide="download" class="w-3.5 h-3.5"></i> Export</button>
      </div>
      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="stat-card rounded-xl p-3 text-white"><div class="text-xl font-bold">${filtered.length}</div><div class="text-xs opacity-90">Total</div></div>
        <div class="stat-card-2 rounded-xl p-3 text-white"><div class="text-xl font-bold">${avg}</div><div class="text-xs opacity-90">Rata-rata</div></div>
        <div class="stat-card-3 rounded-xl p-3 text-white"><div class="text-xl font-bold">${filtered.filter(h=>h.lulus).length}</div><div class="text-xs opacity-90">Lulus</div></div>
      </div>
      <div class="card rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm" id="hasil-table">
            <thead class="bg-gray-50 dark:bg-gray-800"><tr>
              <th class="text-left p-3">Siswa</th><th class="text-left p-3">Kelas</th><th class="text-left p-3">Ujian</th>
              <th class="text-center p-3">Nilai</th><th class="text-center p-3">Status</th><th class="text-left p-3">Waktu</th>
            </tr></thead>
            <tbody>
              ${filtered.map(h => {
                const s = getUser(h.userId), u = getUjian(h.ujianId);
                return `<tr class="border-t border-theme">
                  <td class="p-3">${esc(s?.name||'-')}</td>
                  <td class="p-3">${esc(getKelas(s?.kelasId)?.nama||'-')}</td>
                  <td class="p-3">${esc(u?.judul||'-')}</td>
                  <td class="p-3 text-center font-bold">${h.nilai}</td>
                  <td class="p-3 text-center"><span class="px-2 py-0.5 ${h.lulus?'bg-green-100 text-green-700':'bg-red-100 text-red-700'} rounded text-xs">${h.lulus?'Lulus':'Belum'}</span></td>
                  <td class="p-3 text-xs">${fmtDate(h.submittedAt)}</td>
                </tr>`;
              }).join('') || '<tr><td colspan="6" class="p-6 text-center text-muted">Tidak ada data</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;

  else if (APP_STATE.view === 'audit') {
    content = `
      <h2 class="font-bold text-lg mb-4">Audit Log</h2>
      <div class="card rounded-xl overflow-hidden">
        <div class="overflow-x-auto max-h-[70vh]">

            </tr></thead>
            <tbody>
              ${DB.auditLog.map(l => `<tr class="border-t border-theme">
                <td class="p-3 text-xs">${fmtDate(l.t)}</td>
                <td class="p-3">${esc(l.user)}</td>
                <td class="p-3 font-semibold">${esc(l.aksi)}</td>
                <td class="p-3 text-xs">${esc(l.detail)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
  else if (APP_STATE.view === 'settings') {
    content = `
      <h2 class="font-bold text-lg mb-4">Pengaturan Sistem</h2>
      <div class="card rounded-xl p-5 space-y-4 max-w-xl">
        <div>
          <label class="font-medium">Nama Sekolah</label>

        </div>
        <button onclick="saveSettings()" class="btn-primary px-4 py-2 rounded-lg">Simpan</button>
        <hr class="border-theme"/>

          <button onclick="resetAllData()" class="px-4 py-2 rounded-lg bg-red-500 text-white">Reset Semua Data</button>
        </div>
      </div>
    `;
  }
  
  app.innerHTML = shellLayout('admin', menu, content);
  attachShell(menu);
  attachAdminEvents();
}

function attachAdminEvents() {
  const fs = $('#fs-kelas');
  if (fs) fs.onchange = () => { APP_STATE.filter.kelasId = fs.value; render(); };
  const fmA = $('#f-mapel-admin'), ftA = $('#f-type-admin');
  if (fmA && ftA) {
    const upd = () => {
      const m = fmA.value, t = ftA.value;
      const list = DB.soal.filter(s => (!m || s.mapelId===m) && (!t || s.type===t));
      $('#soal-list-admin').innerHTML = list.map(s => soalCard(s)).join('') || '<div class="text-muted text-sm">Tidak ada soal</div>';
      lucide.createIcons();
    };
    fmA.onchange = upd; ftA.onchange = upd;
  }
  const fUj = $('#f-ujian-admin'), fKls = $('#f-kelas-admin');
  if (fUj && fKls) {
    fUj.onchange = () => { APP_STATE.filter.ujianId = fUj.value; render(); };
    fKls.onchange = () => { APP_STATE.filter.kelasId = fKls.value; render(); };
  }
  const mUj = $('#m-ujian'), mKls = $('#m-kelas');
  if (mUj) mUj.onchange = () => { APP_STATE.filter.ujianId = mUj.value; render(); };
  if (mKls) mKls.onchange = () => { APP_STATE.filter.kelasId = mKls.value; render(); };
}

window.saveSettings = () => {
  DB.settings.namaSekolah = $('#st-nama').value;
  DB.settings.alamat = $('#st-alamat').value;
  DB.settings.idleTimeout = parseInt($('#st-idle').value) || 15;

window.openSoalEditorAdmin = () => {
  // reuse openSoalEditor with full mapel list
  const user = { id: SESSION.userId, mapelIds: DB.mapel.map(m=>m.id) };
  const origSession = SESSION;
  const fakeUser = user;
  // patch getUser temporarily
  const orig = DB.users.find(u=>u.id===SESSION.userId);
  const origMapel = orig.mapelIds;
  orig.mapelIds = DB.mapel.map(m=>m.id);
  openSoalEditor();
  // restore on next tick via observer
  setTimeout(()=>{ orig.mapelIds = origMapel; }, 500);
  // Better: restore after modal closes
  const observer = new MutationObserver(() => {
    if (!$('#modal-root').children.length) {
      orig.mapelIds = origMapel;
      observer.disconnect();
    }
  });
  observer.observe($('#modal-root'), { childList:true });
};
